<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cong OS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><rect width=%2216%22 height=%2216%22 rx=%223%22 fill=%22%230e1116%22/><circle cx=%228%22 cy=%228%22 r=%224%22 fill=%22%234ea1ff%22/></svg>">
  <link rel="stylesheet" href="cockpit.css">
</head>
<body>
  <header>
    <div class="logo">◉ <b>Cong</b> OS</div>
    <div class="omni">
      <input id="omni-in" autocomplete="off" spellcheck="false"
             placeholder="⌘K  ›  / befehl · @person · #tag · id navigieren · sonst fragen…">
    </div>
    <button class="iconbtn" id="theme" title="Light/Dark">🌓</button>
    <button class="iconbtn" id="cop-toggle" title="Copilot">🤖</button>
  </header>

  <main>
    <aside class="rail" id="rail"></aside>

    <section class="stage">
      <div class="lenstabs" id="lenstabs"></div>
      <div class="stagebody" id="stagebody"></div>
    </section>

    <aside class="copilot"></aside>
  </main>

  <div class="status" id="status"></div>

  <script type="module" src="shell.js"></script>
</body>
</html>
