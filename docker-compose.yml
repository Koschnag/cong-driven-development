# CDD im Homelab — Cockpit „Cong OS" hinter Reverse-Proxy mit Basic-Auth.
# Schnellstart + Hinweise: docs/homelab.md
#
#   1) docker run --rm caddy:2 caddy hash-password --plaintext 'DEIN_PASS'
#   2) cp .env.example .env  → CDD_PASS_HASH eintragen (roh, OHNE Anführungszeichen)
#   3) docker compose up -d
#
# Wichtig: Konfig kommt über `env_file` (literal an die Container) statt über
# ${..}-Interpolation — sonst zerlegt Compose das '$' im bcrypt-Hash.

services:
  cdd:
    image: ghcr.io/koschnag/cdd:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - cdd-data:/data            # SPOT-Graph persistent
    expose:
      - "8080"                    # NICHT veröffentlicht — nur über proxy erreichbar

  proxy:
    image: caddy:2
    restart: unless-stopped
    env_file: .env                # CDD_USER / CDD_PASS_HASH / CDD_DOMAIN literal
    ports:
      - "${CDD_HTTP_PORT:-80}:80"     # für HTTP→HTTPS-Redirect + ACME (echte Domain)
      - "${CDD_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - cdd

volumes:
  cdd-data:
  caddy-data:
  caddy-config:
