# CDD im Homelab — Cockpit „Cong OS" hinter Reverse-Proxy mit Basic-Auth.
# Schnellstart: docs/homelab.md
#
#   1) docker run --rm caddy:2 caddy hash-password --plaintext 'DEIN_PASS'
#   2) .env anlegen (CDD_PASS_HASH=..., optional CDD_DOMAIN, ANTHROPIC_API_KEY)
#   3) docker compose up -d   → https://<CDD_DOMAIN>:8443

services:
  cdd:
    image: ghcr.io/koschnag/cdd:latest
    restart: unless-stopped
    volumes:
      - cdd-data:/data            # SPOT-Graph persistent
    environment:
      # Optional — nur für die Cockpit-Chat-Loop (souveräne Engine-Kette):
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
    expose:
      - "8080"                    # NICHT direkt veröffentlicht — nur via proxy

  proxy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "${CDD_HTTPS_PORT:-8443}:443"
    environment:
      CDD_DOMAIN: ${CDD_DOMAIN:-localhost}
      CDD_USER: ${CDD_USER:-cong}
      CDD_PASS_HASH: ${CDD_PASS_HASH:?Bitte CDD_PASS_HASH setzen — siehe docs/homelab.md}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - cdd

volumes:
  cdd-data:
  caddy-data:
  caddy-config:
