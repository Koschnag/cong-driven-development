name: 🐛 Bug Report
description: Etwas funktioniert nicht wie dokumentiert
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: Was ist passiert?
      description: Beobachtetes vs. erwartetes Verhalten.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduktion
      placeholder: |
        1. `cdd init`
        2. `cdd validate`
        3. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: Ausgabe von `cdd version` + OS
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Kontext / Logs
      description: Relevante `.spot/`-Inhalte, Stacktraces, etc.
