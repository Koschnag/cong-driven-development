# Kategorien für automatisch generierte Release Notes
changelog:
  categories:
    - title: 🚀 Features
      labels: [feature, enhancement]
    - title: 🐛 Fixes
      labels: [bug, fix]
    - title: 🧰 Wartung & Dependencies
      labels: [chore, dependencies]
    - title: Sonstiges
      labels: ['*']
