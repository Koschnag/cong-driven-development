name: Dependabot Auto-Merge

# Policy: Dependabot-PRs mit minor/patch-Updates mergen sich selbst,
# sobald die Pflicht-Checks (build-test) grün sind. Major-Updates bleiben
# offen und brauchen ein menschliches Review.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: dependabot/fetch-metadata@v2
        id: meta

      - name: Auto-Merge für minor/patch aktivieren
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
