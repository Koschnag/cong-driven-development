name: Secret-Scan

# Verhindert, dass Credentials/Keys/Tokens im öffentlichen Repo landen.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '23 5 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # gesamte Historie scannen
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
